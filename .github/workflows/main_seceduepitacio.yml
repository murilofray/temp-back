# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - seceduepitacio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://mcr.microsoft.com/
        username: ${{ secrets.AzureAppService_ContainerUsername_91894d246ab144b2801255100785af0c }}
        password: ${{ secrets.AzureAppService_ContainerPassword_0170b3788024461991593d2e0fe4e233 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: mcr.microsoft.com/${{ secrets.AzureAppService_ContainerUsername_91894d246ab144b2801255100785af0c }}/appsvc/staticsite:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'seceduepitacio'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_8ba73311bce34c828f5d79f8a656ad6c }}
        images: 'mcr.microsoft.com/${{ secrets.AzureAppService_ContainerUsername_91894d246ab144b2801255100785af0c }}/appsvc/staticsite:${{ github.sha }}'