# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - seceduepitacio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://index.docker.io/v1/
        username: ${{ secrets.AzureAppService_ContainerUsername_77e545073b61426e8124e5e4cb8c78ab }}
        password: ${{ secrets.AzureAppService_ContainerPassword_d462d25653124caba11f4f499b80145a }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: index.docker.io/${{ secrets.AzureAppService_ContainerUsername_77e545073b61426e8124e5e4cb8c78ab }}/offmurilo/backend:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'seceduepitacio'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_ecc2b2f92ef942b4977156d30973c557 }}
        images: 'index.docker.io/${{ secrets.AzureAppService_ContainerUsername_77e545073b61426e8124e5e4cb8c78ab }}/offmurilo/backend:${{ github.sha }}'