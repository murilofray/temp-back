# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - seceduepitacio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://index.docker.io/v1/
        username: ${{ secrets.AzureAppService_ContainerUsername_823d2245280345bdb424699e511f774a }}
        password: ${{ secrets.AzureAppService_ContainerPassword_7aefcb538b8a4210be6f242f8d501ba2 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: index.docker.io/${{ secrets.AzureAppService_ContainerUsername_823d2245280345bdb424699e511f774a }}/offmurilo/backend:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'seceduepitacio'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_6878e26ca7e74d3b95106c3ea68a6e8b }}
        images: 'index.docker.io/${{ secrets.AzureAppService_ContainerUsername_823d2245280345bdb424699e511f774a }}/offmurilo/backend:${{ github.sha }}'